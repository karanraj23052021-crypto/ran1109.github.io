<!DOCTYPE html>
<html>
<head>
  <title>Ran Super App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255,255,255,0.08);
      --text: white;
    }

    .light {
      --bg: #f1f5f9;
      --card: white;
      --text: black;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    /* SPLASH */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      z-index: 999;
      animation: fadeOut 2s forwards 2s;
    }

    @keyframes fadeOut {
      to {opacity: 0; visibility: hidden;}
    }

    .page {
      display: none;
      padding: 20px;
      padding-bottom: 90px;
      animation: fade 0.3s ease;
    }

    .active {
      display: block;
    }

    @keyframes fade {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 { text-align: center; }

    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 15px;
      margin: 10px 0;
      backdrop-filter: blur(10px);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 5px;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      margin-top: 5px;
      color: white;
    }

    .task {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .navbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      padding: 10px 0;
    }

    .navbar button {
      background: none;
      color: white;
      font-size: 18px;
      opacity: 0.5;
    }

    .navbar button.active {
      opacity: 1;
      transform: scale(1.2);
    }

    .toggle {
      position: fixed;
      top: 10px;
      right: 10px;
    }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">🚀 Ran App</div>

<!-- DARK MODE -->
<button class="toggle" onclick="mode()">🌙</button>

<!-- TO DO -->
<div id="todo" class="page active">
  <h1>📝 To-Do</h1>
  <div class="card">
    <input id="task" placeholder="Tambah tugas...">
    <button onclick="tambah()">Tambah</button>
  </div>
  <div id="list"></div>
</div>

<!-- NOTES -->
<div id="notes" class="page">
  <h1>📒 Notes</h1>
  <div class="card">
    <textarea id="note" placeholder="Tulis sesuatu..."></textarea>
  </div>
</div>

<!-- CLOCK -->
<div id="clock" class="page">
  <h1>🕒 Jam</h1>
  <div class="card">
    <h2 id="jam"></h2>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="nav(this,'todo')" class="active">📝</button>
  <button onclick="nav(this,'notes')">📒</button>
  <button onclick="nav(this,'clock')">🕒</button>
</div>

<script>
function nav(btn, page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.navbar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

/* DARK MODE */
function mode() {
  document.body.classList.toggle("light");
}

/* TODO */
let data = JSON.parse(localStorage.getItem("tasks")) || [];

function render() {
  let html = "";
  data.forEach((t,i)=>{
    html += `<div class="task">
      <span onclick="toggle(${i})" class="${t.done?'done':''}">${t.text}</span>
      <button onclick="hapus(${i})">x</button>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

function tambah(){
  let t = document.getElementById("task").value;
  if(t){
    data.push({text:t,done:false});
    localStorage.setItem("tasks",JSON.stringify(data));
    render();
    document.getElementById("task").value="";
  }
}

function toggle(i){
  data[i].done=!data[i].done;
  localStorage.setItem("tasks",JSON.stringify(data));
  render();
}

function hapus(i){
  data.splice(i,1);
  localStorage.setItem("tasks",JSON.stringify(data));
  render();
}

render();

/* NOTES */
let note = document.getElementById("note");
note.value = localStorage.getItem("note") || "";
note.oninput = () => localStorage.setItem("note", note.value);

/* CLOCK */
setInterval(()=>{
  document.getElementById("jam").innerText = new Date().toLocaleTimeString();
},1000);

/* SERVICE WORKER */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
  </html>
