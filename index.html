<!DOCTYPE html>
<html>
<head>
  <title>Ran Super App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .page {
      display: none;
      padding: 20px;
      padding-bottom: 90px;
      animation: fade 0.3s ease;
    }

    .active {
      display: block;
    }

    @keyframes fade {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #38bdf8, #0ea5e9);
      color: white;
      margin-top: 10px;
      font-weight: bold;
    }

    .task {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
    }

    .done {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .navbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .navbar button {
      background: none;
      font-size: 18px;
      color: white;
    }

    textarea {
      height: 150px;
    }

    .time-box {
      font-size: 40px;
      text-align: center;
      margin: 20px 0;
    }

    .calc-buttons button {
      width: 22%;
    }
  </style>
</head>
<body>

<!-- TO DO -->
<div id="todo" class="page active">
  <h1>📝 To-Do</h1>
  <div class="card">
    <input id="task" placeholder="Tambah tugas...">
    <button onclick="tambah()">Tambah</button>
  </div>
  <div id="list"></div>
</div>

<!-- TIMER -->
<div id="timer" class="page">
  <h1>⏱️ Pomodoro</h1>
  <div class="card">
    <div class="time-box" id="time">25:00</div>
    <button onclick="start()">Start</button>
  </div>
</div>

<!-- NOTES -->
<div id="notes" class="page">
  <h1>📒 Catatan</h1>
  <div class="card">
    <textarea id="note" placeholder="Tulis sesuatu..."></textarea>
  </div>
</div>

<!-- CALCULATOR -->
<div id="calc" class="page">
  <h1>🧮 Kalkulator</h1>
  <div class="card">
    <input id="a" type="number">
    <input id="b" type="number">
    <div class="calc-buttons">
      <button onclick="hitung('+')">+</button>
      <button onclick="hitung('-')">-</button>
      <button onclick="hitung('*')">*</button>
      <button onclick="hitung('/')">/</button>
    </div>
    <h2 id="hasil"></h2>
  </div>
</div>

<!-- CLOCK -->
<div id="clock" class="page">
  <h1>🕒 Jam</h1>
  <div class="card">
    <div class="time-box" id="jam"></div>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="show('todo')">📝</button>
  <button onclick="show('timer')">⏱️</button>
  <button onclick="show('notes')">📒</button>
  <button onclick="show('calc')">🧮</button>
  <button onclick="show('clock')">🕒</button>
</div>

<script>
function show(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

/* TO DO */
let data = JSON.parse(localStorage.getItem("tasks")) || [];

function render() {
  let html = "";
  data.forEach((item, i) => {
    html += `
      <div class="task">
        <span onclick="toggle(${i})" class="${item.done ? 'done' : ''}">
          ${item.text}
        </span>
        <button onclick="hapus(${i})">✕</button>
      </div>
    `;
  });
  document.getElementById("list").innerHTML = html;
}

function tambah() {
  let text = document.getElementById("task").value;
  if (text) {
    data.push({text, done:false});
    localStorage.setItem("tasks", JSON.stringify(data));
    render();
  }
}

function toggle(i) {
  data[i].done = !data[i].done;
  localStorage.setItem("tasks", JSON.stringify(data));
  render();
}

function hapus(i) {
  data.splice(i, 1);
  localStorage.setItem("tasks", JSON.stringify(data));
  render();
}

render();

/* TIMER */
let detik = 1500;
let jalan = false;

function start() {
  if (jalan) return;
  jalan = true;

  let interval = setInterval(() => {
    if (detik <= 0) {
      clearInterval(interval);
      jalan = false;
      alert("Selesai!");
    }
    detik--;
    let m = Math.floor(detik / 60);
    let s = detik % 60;
    document.getElementById("time").innerText =
      `${m}:${s < 10 ? '0' : ''}${s}`;
  }, 1000);
}

/* NOTES */
let note = document.getElementById("note");
note.value = localStorage.getItem("note") || "";

note.addEventListener("input", () => {
  localStorage.setItem("note", note.value);
});

/* CALC */
function hitung(op) {
  let a = Number(document.getElementById("a").value);
  let b = Number(document.getElementById("b").value);
  let hasil;

  if (op === '+') hasil = a + b;
  if (op === '-') hasil = a - b;
  if (op === '*') hasil = a * b;
  if (op === '/') hasil = a / b;

  document.getElementById("hasil").innerText = hasil;
}

/* CLOCK */
setInterval(() => {
  let now = new Date();
  document.getElementById("jam").innerText =
    now.toLocaleTimeString();
}, 1000);
</script>

</body>
    </html>
