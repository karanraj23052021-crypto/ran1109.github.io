<!DOCTYPE html>
<html>
<head>
  <title>Ran Super App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <style>
    body {
      margin:0;
      font-family:sans-serif;
      background:#0f172a;
      color:white;
    }

    .page {display:none; padding:20px;}
    .active {display:block;}

    h1 {text-align:center;}

    .card {
      background:rgba(255,255,255,0.1);
      padding:15px;
      border-radius:15px;
      margin:10px 0;
    }

    input,textarea {
      width:100%;
      padding:10px;
      border-radius:10px;
      border:none;
      margin-top:5px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:10px;
      margin-top:5px;
      background:#38bdf8;
      color:white;
    }

    .navbar {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      background:#000;
      padding:10px;
    }

    .task {
      display:flex;
      justify-content:space-between;
      margin-top:10px;
    }

    .done {text-decoration:line-through;opacity:0.5;}

    #tapBtn {
      width:150px;
      height:150px;
      font-size:30px;
      border-radius:50%;
      margin:20px auto;
      display:block;
      background:red;
    }

    .center {text-align:center;}
  </style>
</head>
<body>

<!-- TO DO -->
<div id="todo" class="page active">
  <h1>📝 To-Do</h1>
  <div class="card">
    <input id="task">
    <button onclick="add()">Tambah</button>
  </div>
  <div id="list"></div>
</div>

<!-- NOTES -->
<div id="notes" class="page">
  <h1>📒 Notes</h1>
  <div class="card">
    <textarea id="note"></textarea>
  </div>
</div>

<!-- TIMER -->
<div id="timer" class="page">
  <h1>⏱️ Timer</h1>
  <div class="card center">
    <h2 id="time">25</h2>
    <button onclick="startTimer()">Start</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="page">
  <h1>🎯 Tap Game</h1>
  <div class="card center">
    <h2>Score: <span id="score">0</span></h2>
    <button onclick="startGame()">Start</button>
    <button id="tapBtn" onclick="tap()">TAP</button>
    <h3 id="result"></h3>
  </div>
</div>

<!-- CLOCK -->
<div id="clock" class="page">
  <h1>🕒 Jam</h1>
  <div class="card center">
    <h2 id="jam"></h2>
  </div>
</div>

<!-- NAV -->
<div class="navbar">
  <button onclick="show('todo')">📝</button>
  <button onclick="show('notes')">📒</button>
  <button onclick="show('timer')">⏱️</button>
  <button onclick="show('game')">🎮</button>
  <button onclick="show('clock')">🕒</button>
</div>

<script>
function show(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

/* TODO */
let data=JSON.parse(localStorage.getItem("t"))||[];

function render(){
  let h="";
  data.forEach((t,i)=>{
    h+=`<div class="task">
    <span onclick="toggle(${i})" class="${t.done?'done':''}">${t.text}</span>
    <button onclick="del(${i})">x</button></div>`;
  });
  list.innerHTML=h;
}

function add(){
  if(task.value){
    data.push({text:task.value,done:false});
    localStorage.setItem("t",JSON.stringify(data));
    task.value="";
    render();
  }
}

function toggle(i){
  data[i].done=!data[i].done;
  localStorage.setItem("t",JSON.stringify(data));
  render();
}

function del(i){
  data.splice(i,1);
  localStorage.setItem("t",JSON.stringify(data));
  render();
}

render();

/* NOTES */
note.value=localStorage.getItem("n")||"";
note.oninput=()=>localStorage.setItem("n",note.value);

/* TIMER */
let t=25,run=false;
function startTimer(){
  if(run)return;
  run=true;
  let i=setInterval(()=>{
    if(t<=0){clearInterval(i);run=false;alert("Done");}
    t--; time.innerText=t;
  },1000);
}

/* GAME */
let score=0,timeLeft=10,playing=false;

function startGame(){
  score=0;
  timeLeft=10;
  playing=true;
  result.innerText="";
  let interval=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){
      clearInterval(interval);
      playing=false;
      result.innerText="Score kamu: "+score;
    }
  },1000);
}

function tap(){
  if(playing){
    score++;
    document.getElementById("score").innerText=score;
  }
}

/* CLOCK */
setInterval(()=>{
  jam.innerText=new Date().toLocaleTimeString();
},1000);

/* SW */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
  </html>
