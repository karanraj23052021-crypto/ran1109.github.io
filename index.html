<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ran Super App</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* RESET & DASAR */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    
    /* CONTAINER UTAMA (Mirip layar HP di tengah desktop) */
    .app-container {
      width: 100%;
      max-width: 480px;
      position: relative;
      padding: 24px 24px 100px 24px; /* Padding bawah untuk area taskbar */
    }

    /* TYPOGRAPHY */
    h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 16px; color: #38bdf8; }
    h3 { font-size: 1.1rem; font-weight: 500; margin-top: 16px; color: #cbd5e1; }

    /* HALAMAN */
    .page { display: none; animation: fadeIn 0.3s ease; }
    .active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .center { text-align: center; }

    /* ELEMEN UI (Kartu, Input, Tombol) */
    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: 0.2s ease;
    }
    .card a { color: #38bdf8; text-decoration: none; word-break: break-all; }
    
    input, textarea, select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(15, 23, 42, 0.6);
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      margin-bottom: 12px;
      outline: none;
      transition: 0.3s ease;
    }
    input:focus, textarea:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
    
    button {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      width: 100%;
      transition: 0.2s ease;
      font-family: inherit;
    }
    button:hover { background: #0ea5e9; transform: scale(0.98); }
    button:active { transform: scale(0.95); }

    /* KHUSUS TO-DO */
    .todo-item {
      display: flex;
      align-items: center;
      padding: 14px;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s;
    }
    .todo-item:hover { background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.3); }
    .todo-item.done { text-decoration: line-through; opacity: 0.4; border-color: transparent; }

    /* TASKBAR / NAVBAR BAWAH */
    .nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 440px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 10px;
      border-radius: 24px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    /* Sembunyikan scrollbar di taskbar */
    .nav::-webkit-scrollbar { display: none; }
    
    .nav button {
      flex: 0 0 auto;
      width: 50px;
      height: 50px;
      padding: 0;
      background: transparent;
      color: white;
      font-size: 1.3rem;
      border-radius: 16px;
    }
    .nav button:hover { background: rgba(255, 255, 255, 0.1); }
    .nav button.active-btn {
      background: rgba(56, 189, 248, 0.2);
      border: 1px solid rgba(56, 189, 248, 0.3);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

<div class="app-container">

  <div id="todo" class="page active">
    <h2>📝 To-Do List</h2>
    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <input id="task" placeholder="Tulis tugas baru..." style="margin-bottom: 0;">
      <button onclick="add()" style="width: auto;">Tambah</button>
    </div>
    <div id="list"></div>
    <h3 style="text-align: right; font-size: 0.9rem;">Selesai: <span id="stat" style="color:#38bdf8"></span></h3>
  </div>

  <div id="cal" class="page">
    <h2>📅 Kalender</h2>
    <div class="card">
      <input type="date" id="date">
      <input id="evText" placeholder="Nama Kegiatan">
      <button onclick="saveEvent()">Simpan Kegiatan</button>
    </div>
    <h3>Daftar Kegiatan</h3>
    <div id="eventsList"></div>
  </div>

  <div id="rem" class="page">
    <h2>⏰ Reminder</h2>
    <div class="card center">
      <p style="margin-bottom: 12px; color: #94a3b8; font-size: 0.9rem;">Set waktu untuk mendapatkan notifikasi</p>
      <input type="time" id="remTime">
      <button onclick="setRem()">Aktifkan Reminder</button>
    </div>
  </div>

  <div id="music" class="page center">
    <h2>🎧 Focus Sound</h2>
    <p style="margin-bottom: 20px; color: #94a3b8; font-size: 0.9rem;">Suara untuk bantu kamu lebih fokus.</p>
    <div class="card">
      <button onclick="lofi()" style="margin-bottom: 12px;">🎧 Play Lofi</button>
      <button onclick="rain()">🌧️ Play Rain</button>
    </div>
    <audio id="audio" loop></audio>
  </div>

  <div id="rand" class="page center">
    <h2>🎲 Random Picker</h2>
    <p style="margin-bottom: 16px; color: #94a3b8; font-size: 0.9rem;">Bantu kamu mengambil keputusan.</p>
    <input id="opt" placeholder="Contoh: Makan Nasi, Makan Mie">
    <button onclick="pick()">Pilih Acak!</button>
    <div class="card" style="margin-top: 20px; min-height: 80px; display:flex; align-items:center; justify-content:center;">
      <h3 id="res" style="margin: 0; font-size: 1.3rem; color: #38bdf8;">- Hasil -</h3>
    </div>
  </div>

  <div id="book" class="page">
    <h2>📌 Bookmark</h2>
    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <input id="linkUrl" placeholder="https://..." style="margin-bottom: 0;">
      <button onclick="saveLink()" style="width: auto;">Simpan</button>
    </div>
    <div id="linksList"></div>
  </div>

  <div id="file" class="page">
    <h2>📁 File</h2>
    <div class="card center">
      <input type="file" onchange="saveFile(event)" style="background: transparent; border: 1px dashed rgba(255,255,255,0.2);">
      <p id="fileName" style="margin-top: 10px; color: #38bdf8; font-size: 0.9rem; word-break: break-all;"></p>
    </div>
  </div>

  <div id="lock" class="page">
    <h2>🔐 Secret Notes</h2>
    <div class="card">
      <input type="password" id="pass" placeholder="Masukkan PIN (1234)">
      <button onclick="unlock()">Buka Brankas</button>
    </div>
    <textarea id="secret" style="display:none; height: 200px; margin-top: 16px;" placeholder="Tulis rahasiamu di sini..."></textarea>
  </div>

</div>

<div class="nav" id="taskbar">
  <button class="nav-btn active-btn" onclick="show('todo', this)">📝</button>
  <button class="nav-btn" onclick="show('cal', this)">📅</button>
  <button class="nav-btn" onclick="show('rem', this)">⏰</button>
  <button class="nav-btn" onclick="show('music', this)">🎧</button>
  <button class="nav-btn" onclick="show('rand', this)">🎲</button>
  <button class="nav-btn" onclick="show('book', this)">📌</button>
  <button class="nav-btn" onclick="show('file', this)">📁</button>
  <button class="nav-btn" onclick="show('lock', this)">🔐</button>
</div>

<script>
// --- NAV LOGIC ---
function show(pageId, btnElement) {
  // Sembunyikan semua halaman
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  // Tampilkan halaman yang dipilih
  document.getElementById(pageId).classList.add('active');
  
  // Update tampilan tombol di taskbar
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-btn'));
  if(btnElement) btnElement.classList.add('active-btn');
}

// --- TODO LIST ---
let t = JSON.parse(localStorage.getItem("t")) || [];
function renderTodo() {
  let doneCount = t.filter(x => x.done).length;
  document.getElementById('stat').innerText = doneCount + "/" + t.length;
  document.getElementById('list').innerHTML = t.map((x, i) => 
    `<div onclick="tog(${i})" class="todo-item ${x.done ? 'done' : ''}">
      ${x.done ? '✅' : '⭕'} <span style="margin-left:10px;">${x.text}</span>
    </div>`
  ).join("");
}
function add() {
  let taskInput = document.getElementById('task');
  if(!taskInput.value.trim()) return;
  t.push({ text: taskInput.value, done: false });
  localStorage.setItem("t", JSON.stringify(t));
  taskInput.value = "";
  renderTodo();
}
function tog(i) {
  t[i].done = !t[i].done;
  localStorage.setItem("t", JSON.stringify(t));
  renderTodo();
}
renderTodo();

// --- CALENDAR ---
let ev = JSON.parse(localStorage.getItem("ev")) || [];
function renderEvents() {
  document.getElementById('eventsList').innerHTML = ev.map(x => 
    `<div class="card">
      <span style="color:#38bdf8; font-size:0.8rem; font-weight:bold;">${x.d}</span><br>
      ${x.e}
    </div>`
  ).join("");
}
function saveEvent() {
  let d = document.getElementById('date').value;
  let e = document.getElementById('evText').value;
  if(!d || !e) { alert("Isi tanggal dan kegiatan!"); return; }
  ev.push({ d, e });
  localStorage.setItem("ev", JSON.stringify(ev));
  document.getElementById('date').value = "";
  document.getElementById('evText').value = "";
  renderEvents();
}
renderEvents();

// --- REMINDER ---
function setRem() {
  let timeStr = document.getElementById('remTime').value;
  if(!timeStr) return alert("Pilih waktu dulu!");
  Notification.requestPermission().then(p => {
    if(p === "granted") {
      alert("Reminder diatur! (Simulasi 5 detik untuk demo)");
      setTimeout(() => new Notification("⏰ Reminder!", { body: "Waktunya cek aplikasimu!" }), 5000);
    } else {
      alert("Izinkan notifikasi di browser dulu ya.");
    }
  });
}

// --- MUSIC ---
let audio = document.getElementById('audio');
function lofi() { audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"; audio.play(); }
function rain() { audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"; audio.play(); }

// --- RANDOM PICKER ---
function pick() {
  let val = document.getElementById('opt').value;
  if(!val) return;
  let arr = val.split(",").map(item => item.trim()).filter(item => item);
  let resText = document.getElementById('res');
  
  // Efek loading simpel
  resText.innerText = "Memilih...";
  setTimeout(() => {
    resText.innerText = arr[Math.floor(Math.random() * arr.length)] + " 🎉";
  }, 500);
}

// --- BOOKMARK ---
// Bug fix: ubah nama variabel lokal agar tidak nabrak id="linksList"
let savedLinks = JSON.parse(localStorage.getItem("l")) || [];
function renderLinks() {
  document.getElementById('linksList').innerHTML = savedLinks.map(x => 
    `<div class="card"><a href="${x}" target="_blank">${x}</a></div>`
  ).join("");
}
function saveLink() {
  let inputLink = document.getElementById('linkUrl');
  if(!inputLink.value) return;
  savedLinks.push(inputLink.value);
  localStorage.setItem("l", JSON.stringify(savedLinks));
  inputLink.value = "";
  renderLinks();
}
renderLinks();

// --- FILE ---
function saveFile(e) {
  let f = e.target.files[0];
  if(f) document.getElementById('fileName').innerText = "File terpilih: " + f.name;
}

// --- LOCK NOTES ---
function unlock() {
  let pass = document.getElementById('pass');
  let secretBox = document.getElementById('secret');
  if(pass.value === "1234") {
    secretBox.style.display = "block";
    pass.style.display = "none";
    event.target.style.display = "none"; // Sembunyikan tombol setelah terbuka
    
    secretBox.value = localStorage.getItem("s") || "";
    // Save otomatis saat mengetik
    secretBox.onkeyup = () => localStorage.setItem("s", secretBox.value);
  } else {
    alert("Password salah bos!");
  }
}

// --- SERVICE WORKER ---
if("serviceWorker" in navigator) {
  // Hanya jalan jika ada file sw.js beneran
  navigator.serviceWorker.register("sw.js").catch(err => console.log("SW blm ada"));
}
</script>

</body>
  </html>
