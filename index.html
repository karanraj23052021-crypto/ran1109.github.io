<!DOCTYPE html>
<html>
<head>
  <title>To-Do Ran</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
      margin: 0;
    }
    .container {
      padding: 20px;
    }
    input {
      padding: 10px;
      width: 65%;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px;
      border: none;
      background: #00c6ff;
      border-radius: 5px;
      font-weight: bold;
    }
    li {
      background: #1f1f1f;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .done {
      text-decoration: line-through;
      opacity: 0.6;
    }
    .hapus {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>To-Do List Ran 📝</h1>

  <input id="task" placeholder="Tambah tugas...">
  <button onclick="tambah()">Tambah</button>

  <ul id="list"></ul>
</div>

<script>
let data = JSON.parse(localStorage.getItem("tasks")) || [];

function render() {
  let html = "";
  data.forEach((item, i) => {
    html += `
      <li>
        <span onclick="toggle(${i})" class="${item.done ? 'done' : ''}">
          ${item.text}
        </span>
        <button class="hapus" onclick="hapus(${i})">X</button>
      </li>
    `;
  });
  document.getElementById("list").innerHTML = html;
}

function tambah() {
  let task = document.getElementById("task").value;
  if (task.trim() !== "") {
    data.push({ text: task, done: false });
    simpan();
    document.getElementById("task").value = "";
    render();
  }
}

function toggle(i) {
  data[i].done = !data[i].done;
  simpan();
  render();
}

function hapus(i) {
  data.splice(i, 1);
  simpan();
  render();
}

function simpan() {
  localStorage.setItem("tasks", JSON.stringify(data));
}

render();
</script>

</body>
</html>
