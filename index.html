<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ran Super App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
.page{display:none;padding:20px}
.active{display:block}
.card{background:rgba(255,255,255,0.1);padding:15px;border-radius:15px;margin:10px 0}
button{padding:10px;border:none;border-radius:10px;background:#38bdf8;color:white;margin-top:5px}
input,textarea{width:100%;padding:10px;border-radius:10px;border:none;margin-top:5px}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:black;padding:10px}
.center{text-align:center}
.done{text-decoration:line-through;opacity:0.5}
</style>
</head>

<body>

<!-- TODO -->
<div id="todo" class="page active">
<h2>To-Do</h2>
<input id="task"><button onclick="add()">Tambah</button>
<div id="list"></div>
<h3>Statistik: <span id="stat"></span></h3>
</div>

<!-- CALENDAR -->
<div id="cal" class="page">
<h2>Kalender</h2>
<input type="date" id="date">
<input id="event" placeholder="Kegiatan">
<button onclick="saveEvent()">Simpan</button>
<div id="events"></div>
</div>

<!-- REMINDER -->
<div id="rem" class="page">
<h2>Reminder</h2>
<input type="time" id="remTime">
<button onclick="setRem()">Set Reminder</button>
</div>

<!-- MUSIC -->
<div id="music" class="page center">
<h2>Focus Sound</h2>
<button onclick="lofi()">🎧 Lofi</button>
<button onclick="rain()">🌧️ Rain</button>
<audio id="audio" loop></audio>
</div>

<!-- RANDOM -->
<div id="rand" class="page center">
<h2>Random Picker</h2>
<input id="opt" placeholder="pisahkan dengan koma">
<button onclick="pick()">Pilih</button>
<h3 id="res"></h3>
</div>

<!-- BOOKMARK -->
<div id="book" class="page">
<h2>Bookmark</h2>
<input id="link">
<button onclick="saveLink()">Simpan</button>
<div id="links"></div>
</div>

<!-- FILE -->
<div id="file" class="page">
<h2>File</h2>
<input type="file" onchange="saveFile(event)">
<div id="files"></div>
</div>

<!-- NOTES LOCK -->
<div id="lock" class="page">
<h2>Lock Notes</h2>
<input type="password" id="pass">
<button onclick="unlock()">Buka</button>
<textarea id="secret" style="display:none"></textarea>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('todo')">📝</button>
<button onclick="show('cal')">📅</button>
<button onclick="show('rem')">⏰</button>
<button onclick="show('music')">🎧</button>
<button onclick="show('rand')">🎲</button>
<button onclick="show('book')">📌</button>
<button onclick="show('file')">📁</button>
<button onclick="show('lock')">🔐</button>
</div>

<script>
function show(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active')}

/* TODO + STAT */
let t=JSON.parse(localStorage.getItem("t"))||[];
function render(){
let done=t.filter(x=>x.done).length;
stat.innerText=done+"/"+t.length;
list.innerHTML=t.map((x,i)=>`<div onclick="tog(${i})" class="${x.done?'done':''}">${x.text}</div>`).join("");
}
function add(){t.push({text:task.value,done:false});localStorage.setItem("t",JSON.stringify(t));render()}
function tog(i){t[i].done=!t[i].done;localStorage.setItem("t",JSON.stringify(t));render()}
render();

/* CALENDAR */
let ev=JSON.parse(localStorage.getItem("ev"))||[];
function saveEvent(){
ev.push({d:date.value,e:event.value});
localStorage.setItem("ev",JSON.stringify(ev));
events.innerHTML=ev.map(x=>x.d+" - "+x.e).join("<br>");
}

/* REMINDER */
function setRem(){
Notification.requestPermission().then(p=>{
if(p==="granted"){
setTimeout(()=>new Notification("Reminder!"),5000);
}});
}

/* MUSIC */
function lofi(){audio.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";audio.play()}
function rain(){audio.src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";audio.play()}

/* RANDOM */
function pick(){
let arr=opt.value.split(",");
res.innerText=arr[Math.floor(Math.random()*arr.length)];
}

/* BOOKMARK */
let links=JSON.parse(localStorage.getItem("l"))||[];
function saveLink(){
links.push(link.value);
localStorage.setItem("l",JSON.stringify(links));
links.innerHTML=links.map(x=>`<a href="${x}" target="_blank">${x}</a>`).join("<br>");
}

/* FILE */
function saveFile(e){
let f=e.target.files[0];
files.innerText=f.name;
}

/* LOCK */
function unlock(){
if(pass.value==="1234"){
secret.style.display="block";
secret.value=localStorage.getItem("s")||"";
secret.oninput=()=>localStorage.setItem("s",secret.value);
}else alert("Password salah");
}

/* SW */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
